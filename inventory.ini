# =============================================================================
# ASMDU Ansible Inventory
# =============================================================================
# Each host must belong to exactly one platform group.
# DG names are defined per-host in host_vars/<hostname>.yml (preferred)
# or fall back to group defaults defined in group_vars/.
#
# Replace the hostnames and IP addresses below with your actual targets.
# ansible_host = IP or FQDN of the target DB server.
# =============================================================================

[exadata_collectors]
exa_prd  ansible_host=<EXA_PRD_IP>
exa_node1 ansible_host=<EXA_NODE1_IP>
exa_node2 ansible_host=<EXA_NODE2_IP>

[vmware_collectors]
vm_db01 ansible_host=<VM_DB01_IP>
vm_db02 ansible_host=<VM_DB02_IP>

# ---------------------------------------------------------------------------
# Add additional platform groups here as needed, e.g.:
# [baremetal_collectors]
# bm_db01  ansible_host=<BM_DB01_IP>
# ---------------------------------------------------------------------------

[all:vars]
ansible_user=oracle

# SSH key (recommended over password auth)
# ansible_ssh_private_key_file=/home/oracle/.ssh/id_rsa

# StrictHostKeyChecking should be enabled in production if known_hosts is managed.
# Set to 'yes' and pre-populate known_hosts via ssh-keyscan for hardened environments.
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15

# Python interpreter -- override per host/group if python3-only targets exist
# ansible_python_interpreter=/usr/bin/python3
