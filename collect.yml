---
# =============================================================================
# collect.yml -- ASMDU Daily Collection Playbook
# =============================================================================
# Compatible with Ansible 2.4.2+
#
# Compatibility fixes applied for Ansible 2.4.2:
#   - loop: replaced with with_items: throughout (loop keyword needs 2.5+)
#   - loop_control: removed (not supported with with_items in 2.4)
#   - become_method: moved from play level to each individual task (needs 2.6+)
#   - selectattr('rc','ne',0) replaced with pure Jinja2 logic (ne needs 2.6+)
#   - map(attribute='rc') replaced with explicit Jinja2 (safer on 2.4)
#   - to_nice_json replaced with tojson (more compatible on 2.4)
#   - serial: 0 replaced with omitting serial (0 not valid in 2.4, omit = all)
#
# Usage:
#   ansible-playbook collect.yml                        # all hosts
#   ansible-playbook collect.yml -l exa_prd             # single host
#   ansible-playbook collect.yml -l exadata_collectors  # single group
#   ansible-playbook collect.yml --tags dg_summary      # only summary task
#
# Access model:
#   - Centralised controller SSHs into all targets as 'oracle' (no password).
#   - oracle has sudo rights to become 'grid' (NOT root) on each target.
#   - ASM / asmcmd is owned by grid; running as any other user will fail.
#
# Sudoers requirement on EVERY target:
#   oracle ALL=(grid) NOPASSWD: /tmp/asmdu_*.sh
#
#   WARNING: Do NOT use oracle ALL=(ALL) NOPASSWD: ALL
#   That escalates to root, not grid. asmdu will run under the wrong user,
#   ASM environment variables will be missing, and collection will fail
#   silently (rc=0 but empty or wrong output).
#
# Prerequisites:
#   - oracle passwordless SSH key deployed to all targets
#   - oracle -> grid sudoers rule in place (see above)
#   - NAS mounted at nas_runs_root on controller
#   - asmdu.sh present at controller_asmdu_path on controller
# =============================================================================

- name: ASMDU -- Collect ASM capacity data and persist to NAS
  hosts: all
  gather_facts: true
  any_errors_fatal: false

  vars:
    # ---- Controller-side paths ----
    # Update these two paths to match your environment
    controller_asmdu_path: "/opt/oracle/asmdu/asmdu.sh"
    nas_runs_root:          "/mnt/asm-capacity/runs"

    # ---- Target-side settings ----
    remote_asmdu:       "/tmp/asmdu_{{ ansible_date_time.epoch }}.sh"
    asmdu_unit_flag:    "-t"   # -t = TB | -g = GB | -m = MB
    asmdu_nocolor_flag: "-n"
    asmdu_timeout:      300    # seconds before shell task is killed

    # dg_roots is defined per-host in host_vars/ or per-group in group_vars/

  pre_tasks:

    # -------------------------------------------------------------------------
    # GUARD 1: Validate dg_roots is defined before touching anything.
    # -------------------------------------------------------------------------
    - name: Validate dg_roots is defined for this host
      assert:
        that:
          - dg_roots is defined
          - dg_roots | length > 0
        msg: >
          Host '{{ inventory_hostname }}' has no dg_roots defined.
          Add it to group_vars/<group>.yml or host_vars/{{ inventory_hostname }}.yml.
      tags: always

    # -------------------------------------------------------------------------
    # GUARD 2: Verify oracle can sudo to grid BEFORE running anything.
    # If sudoers is wrong (escalates to root instead of grid) this fails
    # immediately with a clear message instead of silent bad output.
    # -------------------------------------------------------------------------
    - name: Verify oracle can sudo to grid (pre-flight check)
      become: true
      become_user: grid
      become_method: sudo
      shell: "id -un"
      register:     sudo_check
      changed_when: false
      failed_when:  false
      tags: always

    - name: Abort if sudo to grid is not working correctly
      fail:
        msg: >
          Sudo to grid failed on {{ inventory_hostname }}.
          Expected 'grid' but id returned '{{ sudo_check.stdout | trim }}'.
          Fix sudoers: oracle ALL=(grid) NOPASSWD: /tmp/asmdu_*.sh
      when: sudo_check.stdout | trim != 'grid'
      tags: always

    - name: Capture run timestamp facts
      set_fact:
        run_date:     "{{ ansible_date_time.date }}"
        run_ts:       "{{ ansible_date_time.iso8601 }}"
        run_epoch:    "{{ ansible_date_time.epoch }}"
        host_out_dir: "{{ nas_runs_root }}/{{ ansible_date_time.date }}/{{ inventory_hostname }}"
      tags: always

    - name: Ensure host output directory exists on NAS
      delegate_to: localhost
      file:
        path:  "{{ host_out_dir }}"
        state: directory
        mode:  "0755"
      tags: always

  tasks:

    # =========================================================================
    # SECTION 1 -- Deploy asmdu.sh to target
    # =========================================================================
    - name: Verify asmdu.sh exists on controller before copy
      delegate_to: localhost
      stat:
        path: "{{ controller_asmdu_path }}"
      register: asmdu_stat
      tags: deploy

    - name: Abort if asmdu.sh is missing on controller
      fail:
        msg: "asmdu.sh not found at {{ controller_asmdu_path }} on controller."
      when: not asmdu_stat.stat.exists
      tags: deploy

    - name: Copy asmdu.sh to target (epoch-named to avoid stale conflicts)
      copy:
        src:   "{{ controller_asmdu_path }}"
        dest:  "{{ remote_asmdu }}"
        mode:  "0750"
        owner: oracle
      tags: deploy

    # =========================================================================
    # SECTION 2 -- DG summary (all diskgroups, TB view)
    # =========================================================================
    - name: Run DG summary as grid
      become:        true
      become_user:   grid
      become_method: sudo
      shell: >
        timeout {{ asmdu_timeout }}
        {{ remote_asmdu }} {{ asmdu_nocolor_flag }} {{ asmdu_unit_flag }}
      register:     dg_summary
      changed_when: false
      failed_when:  false
      tags: dg_summary

    - name: Persist DG summary stdout to NAS
      delegate_to: localhost
      copy:
        dest:    "{{ host_out_dir }}/dg_summary.txt"
        content: "{{ dg_summary.stdout | default('') }}\n"
      tags: dg_summary

    - name: Persist DG summary stderr to NAS
      delegate_to: localhost
      copy:
        dest:    "{{ host_out_dir }}/dg_summary.err"
        content: "{{ dg_summary.stderr | default('') }}\n"
      tags: dg_summary

    # =========================================================================
    # SECTION 3 -- Per-DG root subdir drill-down
    # NOTE: with_items used instead of loop for Ansible 2.4.2 compatibility
    # =========================================================================
    - name: Run asmdu per DG root as grid
      become:        true
      become_user:   grid
      become_method: sudo
      shell: >
        timeout {{ asmdu_timeout }}
        {{ remote_asmdu }} {{ asmdu_nocolor_flag }} {{ asmdu_unit_flag }} -d {{ item }}
      with_items:   "{{ dg_roots }}"
      register:     dgroot_runs
      changed_when: false
      failed_when:  false
      tags: dg_roots

    - name: Persist DG root stdout to NAS
      delegate_to: localhost
      copy:
        dest:    "{{ host_out_dir }}/{{ item.item | regex_replace('\\+', '') }}_root_subdirs.txt"
        content: "{{ item.stdout | default('') }}\n"
      with_items: "{{ dgroot_runs.results }}"
      tags: dg_roots

    - name: Persist DG root stderr to NAS
      delegate_to: localhost
      copy:
        dest:    "{{ host_out_dir }}/{{ item.item | regex_replace('\\+', '') }}_root_subdirs.err"
        content: "{{ item.stderr | default('') }}\n"
      with_items: "{{ dgroot_runs.results }}"
      tags: dg_roots

    # =========================================================================
    # SECTION 4 -- Write structured metadata JSON for the reporting layer
    # NOTE: to_nice_json replaced with tojson for 2.4.2 compatibility
    # NOTE: map(attribute) chain replaced with safer set_fact approach
    # =========================================================================
    - name: Build per-host metadata fact
      set_fact:
        host_meta:
          host:             "{{ inventory_hostname }}"
          platform:         "{{ platform_label | default('unknown') }}"
          date:             "{{ run_date }}"
          timestamp:        "{{ run_ts }}"
          dg_roots:         "{{ dg_roots }}"
          dg_summary_rc:    "{{ dg_summary.rc | default(-1) }}"
          dg_summary_ok:    "{{ (dg_summary.rc | default(-1)) == 0 }}"
          ansible_facts_ok: true
      tags: metadata

    - name: Persist metadata JSON to NAS
      delegate_to: localhost
      copy:
        dest:    "{{ host_out_dir }}/meta.json"
        content: "{{ host_meta | to_json }}\n"
      tags: metadata

    # =========================================================================
    # SECTION 5 -- Write human-readable status marker
    # NOTE: selectattr('rc','ne',0) replaced with plain integer comparison
    #       to avoid Ansible 2.4 Jinja2 filter compatibility issues
    # =========================================================================
    - name: Count failed DG root tasks
      set_fact:
        dgroot_total:  "{{ dgroot_runs.results | length }}"
        dgroot_ok_cnt: "{{ dgroot_runs.results | selectattr('rc', 'equalto', 0) | list | length }}"
      tags: metadata

    - name: Compute overall host status
      set_fact:
        dgroot_failed_cnt: "{{ dgroot_total | int - dgroot_ok_cnt | int }}"
        overall_ok: "{{ (dg_summary.rc | default(-1)) == 0 and
                        (dgroot_runs.results | selectattr('rc', 'equalto', 0) | list | length
                         == dgroot_runs.results | length) }}"
      tags: metadata

    - name: Write status.txt to NAS
      delegate_to: localhost
      copy:
        dest: "{{ host_out_dir }}/status.txt"
        content: |
          host={{ inventory_hostname }}
          platform={{ platform_label | default('unknown') }}
          date={{ run_date }}
          timestamp={{ run_ts }}
          dg_summary_rc={{ dg_summary.rc | default('NA') }}
          dgroot_tasks={{ dgroot_total }}
          dgroot_failed={{ dgroot_failed_cnt }}
          overall_ok={{ overall_ok }}
      tags: metadata

  post_tasks:

    # =========================================================================
    # SECTION 6 -- Cleanup: remove asmdu.sh from target
    # =========================================================================
    - name: Remove asmdu.sh from target
      file:
        path:  "{{ remote_asmdu }}"
        state: absent
      ignore_errors: true
      tags: always
