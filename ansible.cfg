# =============================================================================
# ansible.cfg -- Ansible Configuration
# Compatible with Ansible 2.4.2+
# =============================================================================

[defaults]
inventory         = ./inventory.ini
host_key_checking = False
retry_files_enabled = True
timeout           = 60
forks             = 30
# 'yaml' callback needs ansible 2.5+; use 'default' for 2.4.2 compatibility
stdout_callback   = default
bin_ansible_callbacks = True
# fact caching speeds up large fleets -- cache is stored in /tmp
gathering              = smart
fact_caching           = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout   = 86400

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=30 -o ServerAliveCountMax=3
